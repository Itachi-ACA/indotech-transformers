[build]
  base = "client"
  command = "npm run build"
  publish = "dist"

# Proxy all API calls to Render backend
[[redirects]]
  from = "/api/*"
  to = "https://indotech-transformers.onrender.com/api/:splat"
  status = 200
  force = true

# SPA fallback — must be LAST
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
